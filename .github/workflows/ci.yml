name: Elite SDET CI

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]

jobs:

  unit_tests:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          pytest -m unit -v


  integration_tests:
    runs-on: ubuntu-22.04
    needs: unit_tests

    env:
      DB_SERVER: localhost
      DB_NAME: TravelXDB
      DB_USER: sa
      DB_PASSWORD: YourStrong!Passw0rd
      APP_PORT: 8000

      BUILD_ID: GHA_${{ github.run_number }}
      ENV_NAME: CI

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SQL Dependencies
        run: |
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17
          sudo apt-get install -y unixodbc-dev
          sudo apt-get install -y mssql-tools
          echo 'export PATH="$PATH:/opt/mssql-tools/bin"' >> ~/.bashrc

      - name: Start SQL Server Container
        run: |
          docker run -e "ACCEPT_EULA=Y" \
                     -e "SA_PASSWORD=YourStrong!Passw0rd" \
                     -p 1433:1433 \
                     -d --name sql1 \
                     mcr.microsoft.com/mssql/server:2019-latest

      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -Q "SELECT 1" && break
            echo "Waiting for SQL Server..."
            sleep 5
          done

      - name: Initialize Database
        run: |
          /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -Q "IF DB_ID('TravelXDB') IS NULL CREATE DATABASE TravelXDB;"
          /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -d TravelXDB -i schema.sql

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run Integration Tests with Coverage
        run: |
          mkdir -p reports
          python -m pytest -m "integration or e2e" \
            --junitxml=reports/report.xml \
            --html=reports/report.html \
            --self-contained-html \
            --cov=backend \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage-html \
            --cov-fail-under=80

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: reports/


  performance_tests:
    runs-on: ubuntu-22.04
    needs: integration_tests

    env:
      DB_SERVER: localhost
      DB_NAME: TravelXDB
      DB_USER: sa
      DB_PASSWORD: YourStrong!Passw0rd
      APP_PORT: 8000

      BUILD_ID: GHA_${{ github.run_number }}
      ENV_NAME: CI

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SQL Dependencies
        run: |
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17
          sudo apt-get install -y unixodbc-dev
          sudo apt-get install -y mssql-tools
          echo 'export PATH="$PATH:/opt/mssql-tools/bin"' >> ~/.bashrc

      - name: Start SQL Server Container
        run: |
          docker run -e "ACCEPT_EULA=Y" \
                     -e "SA_PASSWORD=YourStrong!Passw0rd" \
                     -p 1433:1433 \
                     -d --name sql1 \
                     mcr.microsoft.com/mssql/server:2019-latest

      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -Q "SELECT 1" && break
            echo "Waiting for SQL Server..."
            sleep 5
          done

      - name: Initialize Database
        run: |
          /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -Q "IF DB_ID('TravelXDB') IS NULL CREATE DATABASE TravelXDB;"
          /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -d TravelXDB -i schema.sql

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Performance SLA Tests
        run: |
          python -m pytest -m performance -v -s

      - name: Upload Performance Report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: reports/


  ui_tests:
    runs-on: ubuntu-22.04
    needs: performance_tests

    env:
      DB_SERVER: localhost
      DB_NAME: TravelXDB
      DB_USER: sa
      DB_PASSWORD: YourStrong!Passw0rd
      APP_PORT: 8000

      BUILD_ID: GHA_${{ github.run_number }}
      ENV_NAME: CI

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SQL Dependencies
        run: |
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17
          sudo apt-get install -y unixodbc-dev
          sudo apt-get install -y mssql-tools
          echo 'export PATH="$PATH:/opt/mssql-tools/bin"' >> ~/.bashrc

      - name: Start SQL Server Container
        run: |
          docker run -e "ACCEPT_EULA=Y" \
                     -e "SA_PASSWORD=YourStrong!Passw0rd" \
                     -p 1433:1433 \
                     -d --name sql1 \
                     mcr.microsoft.com/mssql/server:2019-latest

      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -Q "SELECT 1" && break
            echo "Waiting for SQL Server..."
            sleep 5
          done

      - name: Initialize Database
        run: |
          /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -Q "IF DB_ID('TravelXDB') IS NULL CREATE DATABASE TravelXDB;"
          /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -d TravelXDB -i schema.sql

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Start Uvicorn
        run: |
          nohup python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run UI Tests
        run: |
          python -m pytest -m e2e_ui

      - name: Upload UI Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-reports
          path: reports/