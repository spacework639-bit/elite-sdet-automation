name: Elite SDET CI

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: YourStrong!Passw0rd
          ACCEPT_EULA: Y
        ports:
          - 1433:1433

    env:
      DB_SERVER: localhost
      DB_NAME: master
      DB_USER: sa
      DB_PASSWORD: YourStrong!Passw0rd
      APP_PORT: 8000

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Wait for SQL Server
        run: |
          sleep 20

      - name: Run Tests
        run: |
          python -m pytest
