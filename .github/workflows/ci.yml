name: Elite SDET CI

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]

jobs:

  unit_tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Unit Tests (Docker)
        run: docker compose run --rm tests pytest -m unit -v


  integration_tests:
    runs-on: ubuntu-latest
    needs: unit_tests

    steps:
      - uses: actions/checkout@v4

      - name: Run Integration + E2E Tests (Docker)
        run: docker compose up --build --abort-on-container-exit


  performance_tests:
    runs-on: ubuntu-latest
    needs: integration_tests

    steps:
      - uses: actions/checkout@v4

      - name: Run Performance Tests (Docker)
        run: docker compose run --rm tests pytest -m performance -v


  ui_tests:
    runs-on: ubuntu-latest
    needs: performance_tests

    steps:
      - uses: actions/checkout@v4

      - name: Run UI Tests (Docker)
        run: docker compose run --rm tests pytest -m e2e_ui -v