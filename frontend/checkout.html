<!DOCTYPE html>
<html>

<head>

<title>Checkout</title>

<style>

body{
 font-family:Arial;
 margin:40px;
}

.checkout-item{
 display:flex;
 gap:20px;
 border-bottom:1px solid #ddd;
 padding:15px 0;
 align-items:center;
}

.checkout-item img{
 width:100px;
}

.total{
 font-size:22px;
 margin-top:20px;
 font-weight:bold;
}

.pay-btn{
 background:#388e3c;
 color:white;
 border:none;
 padding:12px 25px;
 cursor:pointer;
 margin-top:20px;
}

</style>

</head>

<body>

<h1>Checkout</h1>

<div id="items"></div>

<div id="total"></div>

<button id="pay-btn" class="pay-btn" onclick="goPayment()">
Proceed to Payment
</button>


<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

const container = document.getElementById("items")

let total = 0


function renderCheckout(){

 if(cart.length === 0){
   container.innerHTML = "<p>Your cart is empty</p>"
   document.getElementById("total").innerHTML = ""
   return
 }

 cart.forEach(item => {

   const quantity = item.quantity || 1

   total += item.price * quantity

   const div = document.createElement("div")

   div.className = "checkout-item"

   div.innerHTML = `
     <img src="${item.image}">
     <div>
        <h3>${item.name}</h3>
        <p>Price: ₹${item.price}</p>
        <p>Quantity: ${quantity}</p>
     </div>
   `

   container.appendChild(div)

 })

 document.getElementById("total").innerHTML = "Total: ₹" + total

}


function goPayment(){

 if(cart.length === 0){
   alert("Cart is empty")
   return
 }

 localStorage.setItem("order_total", total)

 window.location = "/frontend/payment.html"

}


renderCheckout()

</script>

</body>

</html>
