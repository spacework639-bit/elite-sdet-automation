<!DOCTYPE html>
<html>
<head>
<title>Elite Store</title>

<style>

body{
  font-family: Arial;
  margin:40px;
}

#products{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:20px;
}

.product-card{
  border:1px solid #ddd;
  padding:15px;
  border-radius:8px;
  text-align:center;
}

button{
  background:#2874f0;
  color:white;
  border:none;
  padding:8px 12px;
  cursor:pointer;
  margin-top:5px;
}

button:hover{
  background:#0b5ed7;
}

img{
  margin-bottom:10px;
}

</style>

</head>

<body>

<h1>Elite Store</h1>
<a href="/frontend/cart.html">🛒 View Cart</a>
<a href="/frontend/orders.html">📦 My Orders</a>

<div id="products"></div>

<script>

fetch("http://localhost:8000/products")
.then(res => res.json())
.then(products => {

 const container = document.getElementById("products")

 products.forEach(p => {

   const item = document.createElement("div")
   item.className = "product-card"

   item.innerHTML = `
     <img src="${p.image_url || ''}" width="150">
     <h3>${p.name}</h3>
     <p>Price: ₹${p.price}</p>
     <p>Category: ${p.category}</p>

     <button onclick="viewProduct(${p.id})">
        View Details
     </button>

     <button onclick='addToCart(${JSON.stringify(p)})'>
        Add to Cart
     </button>
   `

   container.appendChild(item)

 })

})


function viewProduct(id){
  window.location = "/frontend/product_details.html?id=" + id
}


function addToCart(product){

 let cart = JSON.parse(localStorage.getItem("cart")) || []

 // check if already exists → increase quantity
 const existing = cart.find(item => item.id === product.id)

 if(existing){
   existing.quantity += 1
 }else{
   cart.push({
     id: product.id,
     name: product.name,
     price: product.price,
     image: product.image_url,
     quantity: 1
   })
 }

 localStorage.setItem("cart", JSON.stringify(cart))

 alert("Added to cart")

}

</script>

</body>
</html>
