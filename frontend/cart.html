<!DOCTYPE html>
<html>

<head>
<title>Cart</title>

<style>

body{
  font-family: Arial;
  margin:40px;
}

.cart-item{
  display:flex;
  gap:20px;
  border-bottom:1px solid #ddd;
  padding:15px 0;
  align-items:center;
}

.cart-item img{
  width:100px;
}

.cart-details{
  flex:1;
}

.remove-btn{
  background:#d32f2f;
  color:white;
  border:none;
  padding:6px 12px;
  cursor:pointer;
}

.total{
  font-size:22px;
  margin-top:20px;
  font-weight:bold;
}

.checkout-btn{
  background:#ff9f00;
  color:white;
  border:none;
  padding:10px 20px;
  cursor:pointer;
  margin-top:20px;
}

.empty{
  font-size:18px;
  color:#777;
}

</style>

</head>


<body>

<h1>Your Cart</h1>

<div id="cart"></div>

<div id="total"></div>

<button class="checkout-btn" onclick="checkout()">Checkout</button>


<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

const container = document.getElementById("cart")

let total = 0


function renderCart(){

 container.innerHTML = ""

 total = 0

 if(cart.length === 0){
    container.innerHTML = "<p class='empty'>Your cart is empty</p>"
    document.getElementById("total").innerHTML = ""
    return
 }

 cart.forEach((item,index) => {

   const quantity = item.quantity || 1

   total += item.price * quantity

   const div = document.createElement("div")

   div.className = "cart-item"

   div.innerHTML = `
     <img src="${item.image}">
     <div class="cart-details">
        <h3>${item.name}</h3>
        <p>Price: ₹${item.price}</p>
        <p>Quantity: ${quantity}</p>
     </div>
     <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
   `

   container.appendChild(div)

 })

 document.getElementById("total").innerHTML = "Total: ₹" + total

}


function removeItem(index){

 cart.splice(index,1)

 localStorage.setItem("cart", JSON.stringify(cart))

 renderCart()

}


function checkout(){

 if(cart.length === 0){
   alert("Cart is empty")
   return
 }

 window.location = "/frontend/checkout.html"

}


renderCart()

</script>

</body>

</html>
