<!DOCTYPE html>
<html>

<head>
<title>Order Status</title>

<style>
body{
 font-family:Arial;
 margin:40px;
}

.status{
 font-size:22px;
 margin:20px 0;
}

button{
 padding:10px 20px;
 margin-right:10px;
 border:none;
 color:white;
 cursor:pointer;
}

.cancel{
 background:red;
}

.return{
 background:orange;
}

</style>

</head>

<body>

<h1>Order Status</h1>

<div id="order"></div>

<script>

const params = new URLSearchParams(window.location.search)
const orderId = params.get("id")

async function loadOrder(){

 const res = await fetch("http://localhost:8000/orders/" + orderId)
 const data = await res.json()

 render(data)
}

function render(order){

 const container = document.getElementById("order")

 container.innerHTML = `
   <p><b>Order ID:</b> ${order.order_id}</p>
   <p><b>Status:</b> ${order.status}</p>
   <p><b>Product:</b> ${order.product_id}</p>
   <p><b>Quantity:</b> ${order.quantity}</p>
 `

 // show buttons based on status
 if(order.status === "pending" || order.status === "confirmed"){
   container.innerHTML += `
     <button class="cancel" onclick="cancelOrder()">Cancel Order</button>
   `
 }

 if(order.status === "completed"){
   container.innerHTML += `
     <button class="return" onclick="returnOrder()">Return Order</button>
   `
 }
}

async function cancelOrder(){

 await fetch(`http://localhost:8000/orders/${orderId}/cancel`,{
   method:"POST"
 })

 alert("Order cancelled")

 loadOrder()
}

async function returnOrder(){

 await fetch(`http://localhost:8000/orders/${orderId}/return`,{
   method:"POST"
 })

 alert("Return requested")

 loadOrder()
}

loadOrder()

</script>

</body>

</html>
