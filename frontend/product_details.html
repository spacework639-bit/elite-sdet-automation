<!DOCTYPE html>
<html>
<head>
<title>Elite Store</title>

<style>

body{
  font-family: Arial, Helvetica, sans-serif;
  margin:40px;
  background:#f5f5f5;
}

.page-title{
  font-size:22px;
  margin-bottom:25px;
  color:#333;
}                   

.product-container{
  display:flex;
  gap:40px;
  background:white;
  padding:30px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.image-box img{
  width:320px;
}

.info-box{
  max-width:400px;
}

.product-name{
  font-size:26px;
  margin-bottom:10px;
}

.price{
  color:#388e3c;
  font-size:24px;
  font-weight:bold;
  margin-bottom:15px;
}

.category{
  color:#666;
  margin-bottom:25px;
}

button{
  background:#ff9f00;
  color:white;
  border:none;
  padding:12px 22px;
  cursor:pointer;
  font-size:16px;
  border-radius:4px;
}

button:hover{
  background:#fb641b;
}

</style>

</head>

<body>

<div class="page-title">Elite Store</div>

<div id="product"></div>

<script>
const params = new URLSearchParams(window.location.search)
const id = params.get("id")

let p = null   // IMPORTANT (global)

fetch("http://localhost:8000/products/" + id)
.then(res => res.json())
.then(product => {

 p = product   // store globally

 const container = document.getElementById("product")

 container.innerHTML = `
   <div class="product-container">

      <div class="image-box">
        <img src="${p.image_url}">
      </div>

      <div class="info-box">

        <div class="product-name">${p.name}</div>

        <div class="price">₹${p.price}</div>

        <div class="category">Category: ${p.category}</div>

        <button onclick="addToCart()">Add to Cart</button>

      </div>

   </div>
 `
})

function addToCart(){

 console.log("Product p:", p)

 let cart = JSON.parse(localStorage.getItem("cart")) || []

 const product = {
   id: p.id,
   name: p.name,
   price: p.price,
   image: p.image_url
 }

 cart.push({
   id: product.id,
   name: product.name,
   price: product.price,
   image: product.image,
   quantity: 1
 })

 localStorage.setItem("cart", JSON.stringify(cart))

 alert("Product added to cart")

}

</script>

</body>
</html>
