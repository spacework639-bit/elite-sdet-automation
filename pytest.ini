[pytest]
markers =
    smoke: fast sanity checks for core endpoints
    regression: full regression suite
    api: API-level tests
    e2e: end-to-end business flow tests
    ui: UI automation tests
    failure(type, severity, release_blocker): business failure classification
    idempotency:testig two order flow
    concurrency:parallell testing
    e2e_ui:uitest

